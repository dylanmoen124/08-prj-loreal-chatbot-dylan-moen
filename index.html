<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f172a" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="dark-theme">
    <div class="page-wrapper">
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oreal logo" class="site-logo" />
        <h1 class="site-title">Smart Product Advisor</h1>
      </header>

      <main class="chat-main">
        <section class="chatbox" aria-label="Chat interface">
          <div id="chatWindow" class="chat-window" aria-live="polite"></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden"
              >Type your message</label
            >
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" aria-label="Send message">
              <span class="material-icons" aria-hidden="true">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; 2025 Company Name. All rights reserved.</p>
      </footer>
    </div>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
